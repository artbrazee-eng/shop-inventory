<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shop">
<meta name="theme-color" content="#1a1714">
<title>Shop — Pinons' End</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#1a1714;--bg2:#221f1b;--bg3:#2a2620;--surface:#332e27;--border:#47413a;--border-hi:#6b6055;
  --brass:#c8922a;--brass-d:#8a6218;--brass-l:#e8b84a;--brass-xl:#f5d07a;
  --text:#ede5d8;--text-2:#a89880;--text-3:#6b5f52;--red:#b03020;--green:#3a7a45;
  --r:3px;--serif:'Libre Baskerville',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono','Courier New',monospace;
  --shadow:0 4px 24px rgba(0,0,0,0.5);--transition:0.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100%;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
button{cursor:pointer;font-family:var(--sans);border:none;transition:var(--transition);}
button:active{transform:scale(0.97);}
input,select,textarea{font-family:var(--sans);font-size:14px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;width:100%;outline:none;transition:border-color var(--transition);}
input:focus,select:focus,textarea:focus{border-color:var(--brass);}
select option{background:var(--bg2);}
input::placeholder,textarea::placeholder{color:var(--text-3);}
label{font-size:11px;color:var(--text-2);letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:5px;font-weight:500;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}

/* PIN */
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);background-image:radial-gradient(ellipse at 50% 0%,rgba(200,146,42,0.08) 0%,transparent 70%);}
.pin-lockup{text-align:center;margin-bottom:48px;}
.pin-lockup .mark{font-size:40px;margin-bottom:16px;}
.pin-lockup h1{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--text);letter-spacing:0.02em;}
.pin-lockup p{font-size:13px;color:var(--text-3);margin-top:6px;letter-spacing:0.04em;text-transform:uppercase;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:36px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:var(--transition);}
.pin-dot.filled{background:var(--brass);border-color:var(--brass);box-shadow:0 0 12px rgba(200,146,42,0.4);}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
.pin-key{width:72px;height:72px;border-radius:50%;background:var(--surface);color:var(--text);font-size:22px;font-weight:300;border:1px solid var(--border);transition:var(--transition);}
.pin-key:hover{background:var(--bg3);border-color:var(--brass-d);}
.pin-key:active{background:var(--brass-d);}
.pin-key.sub{font-size:13px;color:var(--text-2);}
.pin-error{color:var(--red);font-size:13px;text-align:center;margin-top:16px;height:20px;}

/* APP */
#app-screen{padding-bottom:80px;}
#topbar{position:sticky;top:0;z-index:50;background:rgba(26,23,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:56px;}
#topbar .logo{font-family:var(--serif);font-size:17px;color:var(--brass-l);flex:1;font-style:italic;}
#topbar .stats-pill{font-family:var(--mono);font-size:11px;color:var(--text-3);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}
.icon-btn{background:transparent;color:var(--text-2);width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid transparent;}
.icon-btn:hover{background:var(--bg3);border-color:var(--border);color:var(--text);}
#toolbar{padding:10px 16px;display:flex;gap:8px;background:var(--bg2);border-bottom:1px solid var(--border);}
#toolbar input[type=search]{flex:1;background:var(--bg);}
#toolbar select{width:auto;min-width:130px;background:var(--bg);}
#dashboard{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid var(--border);}
#dashboard::-webkit-scrollbar{display:none;}
.dash-card{flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;min-width:120px;}
.dash-card .dc-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;}
.dash-card .dc-val{font-family:var(--mono);font-size:18px;color:var(--brass-l);margin-top:2px;}
.dash-card .dc-sub{font-size:11px;color:var(--text-3);margin-top:1px;}
#cat-tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg);}
#cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;transition:var(--transition);white-space:nowrap;}
.cat-tab.active{background:var(--brass-d);color:var(--brass-xl);border-color:var(--brass-d);}
.cat-tab:hover:not(.active){border-color:var(--border-hi);color:var(--text);}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border);}
@media(max-width:480px){#grid{grid-template-columns:repeat(2,1fr);}}
.tool-card{background:var(--bg2);cursor:pointer;transition:background var(--transition);display:flex;flex-direction:column;}
.tool-card:hover{background:var(--bg3);}
.tc-photo{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:36px;position:relative;}
.tc-photo img{width:100%;height:100%;object-fit:cover;}
.tc-photo .photo-count{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.7);color:var(--text-2);font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:10px;}
.tc-qty-badge{position:absolute;top:6px;left:6px;background:rgba(200,146,42,0.85);color:#1a1714;font-size:11px;font-family:var(--mono);font-weight:700;padding:2px 8px;border-radius:10px;}
.tc-body{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:3px;}
.tc-cat{font-size:10px;color:var(--brass-d);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;}
.tc-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;}
.tc-maker{font-size:11px;color:var(--text-3);}
.tc-vals{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.tc-val{font-family:var(--mono);font-size:11px;color:var(--text-3);}
.tc-val span{color:var(--brass-l);}
.empty-state{background:var(--bg2);grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-3);}
.empty-state .icon{font-size:52px;margin-bottom:16px;opacity:0.4;}
#fab{position:fixed;bottom:24px;right:20px;z-index:60;width:56px;height:56px;border-radius:50%;background:var(--brass);color:#1a1714;font-size:26px;box-shadow:0 4px 20px rgba(200,146,42,0.45);display:flex;align-items:center;justify-content:center;border:none;}
#fab:hover{background:var(--brass-l);}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:55;background:rgba(26,23,20,0.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;height:60px;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;color:var(--text-3);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;border:none;}
.nav-btn .nav-icon{font-size:20px;}
.nav-btn.active{color:var(--brass-l);}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(10,8,6,0.88);backdrop-filter:blur(4px);overflow-y:auto;padding:20px 16px;}
.overlay.open{display:block;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);max-width:600px;margin:0 auto;overflow:hidden;box-shadow:var(--shadow);}
.panel-hd{background:var(--bg3);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.panel-hd h2{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--brass-l);font-style:italic;}
.panel-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
.panel-ft{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.btn{padding:9px 18px;border-radius:var(--r);font-size:14px;font-weight:500;border:none;}
.btn-primary{background:var(--brass);color:#1a1714;}
.btn-primary:hover{background:var(--brass-l);}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border-hi);color:var(--text);}
.btn-danger{background:var(--red);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:400px){.form-row,.form-row-3{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;}
.calc-display{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;font-family:var(--mono);font-size:15px;color:var(--brass-l);text-align:right;}

/* PHOTOS */
.photo-strip{display:flex;gap:8px;flex-wrap:wrap;}
.photo-thumb{position:relative;width:76px;height:76px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;flex-shrink:0;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .del-ph{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.75);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;border:none;line-height:1;}
.add-ph-btn{width:76px;height:76px;border:1.5px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;color:var(--text-3);font-size:11px;cursor:pointer;flex-shrink:0;}
.add-ph-btn .plus{font-size:22px;line-height:1;}
.add-ph-btn:hover{border-color:var(--brass-d);color:var(--brass-d);}

/* DETAIL */
#detail-overlay{z-index:300;}
#detail-panel{max-width:700px;}
.detail-hero{position:relative;background:var(--bg);}
.detail-hero-img{width:100%;max-height:340px;object-fit:cover;display:block;cursor:zoom-in;}
.detail-hero-placeholder{width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:56px;color:var(--text-3);background:var(--bg3);}
.hero-thumb-strip{display:flex;gap:6px;padding:8px 12px;background:var(--bg3);overflow-x:auto;}
.hero-thumb-strip::-webkit-scrollbar{display:none;}
.hero-thumb{width:52px;height:52px;border-radius:var(--r);overflow:hidden;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
.hero-thumb img{width:100%;height:100%;object-fit:cover;}
.hero-thumb.active{border-color:var(--brass);}
.detail-body{padding:16px 20px;}
.detail-name{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--text);margin-bottom:4px;}
.detail-cat{font-size:11px;color:var(--brass-d);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:16px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 24px;margin-bottom:16px;}
.detail-field label{font-size:10px;}
.detail-field .val{font-family:var(--mono);font-size:17px;color:var(--brass-l);margin-top:3px;}
.detail-field .val.plain{color:var(--text);font-size:14px;font-family:var(--sans);}
.detail-field .val.total{font-size:20px;color:var(--brass-xl);}
.detail-note{background:var(--bg3);border-left:2px solid var(--brass-d);padding:12px 16px;border-radius:0 var(--r) var(--r) 0;font-size:14px;color:var(--text-2);line-height:1.7;white-space:pre-wrap;margin-top:16px;}
.detail-ft{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:space-between;align-items:center;}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:500;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;}
#lb-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* LOV */
.lov-item{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);gap:10px;}
.lov-item span{flex:1;font-size:14px;}
.lov-add-row{display:flex;gap:8px;padding:12px 16px;}

/* CONFIRM */
#confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:600;align-items:center;justify-content:center;}
#confirm-overlay.open{display:flex;}
#confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;max-width:320px;width:90%;text-align:center;box-shadow:var(--shadow);}
#confirm-box h3{font-family:var(--serif);font-weight:400;font-size:18px;margin-bottom:10px;}
#confirm-box p{color:var(--text-2);font-size:13px;margin-bottom:24px;line-height:1.5;}
#confirm-box .actions{display:flex;gap:10px;justify-content:center;}

/* LOADING / TOAST */
#loading-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--brass);z-index:999;transform:scaleX(0);transform-origin:left;transition:transform 0.3s ease;}
#loading-bar.active{transform:scaleX(0.7);}
#loading-bar.done{transform:scaleX(1);transition:transform 0.1s ease;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;z-index:700;opacity:0;transition:all 0.2s ease;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;}
.sync-dot.syncing{background:var(--brass);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div id="loading-bar"></div>
<div id="toast"></div>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-lockup">
    <div class="mark">⚒</div>
    <h1>Shop Inventory</h1>
    <p>Pinons' End</p>
  </div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key sub" onclick="pinClear()">Clear</button>
    <button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key sub" onclick="pinBack()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div id="topbar">
    <div class="logo">Shop</div>
    <div class="stats-pill" id="header-stats">— tools</div>
    <button class="icon-btn" onclick="openLov()" title="Categories">⊞</button>
    <button class="icon-btn" onclick="exportPDF()" title="PDF export — coming soon">⎙</button>
  </div>
  <div id="toolbar">
    <input type="search" id="search-input" placeholder="Search…" oninput="renderGrid()">
    <select id="sort-sel" onchange="renderGrid()">
      <option value="name">Name</option>
      <option value="cat">Category</option>
      <option value="value">Value ↓</option>
      <option value="price">Price ↓</option>
    </select>
  </div>
  <div id="dashboard"></div>
  <div id="cat-tabs"></div>
  <div id="grid"></div>
  <button id="fab" onclick="openAdd()">+</button>
  <div id="bottom-nav">
    <button class="nav-btn active" onclick="showView('grid')"><span class="nav-icon">⊞</span>Grid</button>
    <button class="nav-btn" onclick="showView('list')"><span class="nav-icon">☰</span>List</button>
    <button class="nav-btn" onclick="syncNow()"><span class="nav-icon"><span class="sync-dot" id="sync-dot"></span></span>Sync</button>
  </div>
</div>

<!-- ADD/EDIT -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="panel">
    <div class="panel-hd">
      <h2 id="modal-title">Add Tool</h2>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label>Tool Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Bessey K Body Clamp" autocomplete="off">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select id="f-cat"></select>
        </div>
        <div class="form-group">
          <label>Condition</label>
          <select id="f-condition">
            <option>Excellent</option><option>Good</option><option>Fair</option><option>Poor</option>
          </select>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="f-qty" placeholder="1" min="1" step="1" value="1" oninput="updateCalc()">
        </div>
        <div class="form-group">
          <label>Unit Value ($)</label>
          <input type="number" id="f-value" placeholder="0.00" min="0" step="0.01" oninput="updateCalc()">
        </div>
        <div class="form-group">
          <label>Total Value</label>
          <div class="calc-display" id="calc-display">—</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Purchase Price — per unit ($)</label>
          <input type="number" id="f-price" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Maker / Brand</label>
          <input type="text" id="f-maker" placeholder="e.g. Bessey">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Model / Serial</label>
          <input type="text" id="f-model" placeholder="e.g. KRE3524">
        </div>
        <div class="form-group"></div>
      </div>
      <div class="form-group">
        <label>Notes — what it does, provenance, quirks</label>
        <textarea id="f-note" rows="3" placeholder="Describe the tool…"></textarea>
      </div>
      <div class="form-group">
        <label>Photos</label>
        <div class="photo-strip" id="photo-strip"></div>
        <input type="file" id="photo-input" accept="image/*" multiple capture="environment" style="display:none" onchange="handlePhotos(event)">
      </div>
    </div>
    <div class="panel-ft">
      <button class="btn btn-danger btn-sm" id="delete-btn" onclick="deleteCurrent()" style="display:none;margin-right:auto">Delete</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTool()" id="save-btn">Save Tool</button>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="panel" id="detail-panel" style="max-width:700px">
    <div class="panel-hd">
      <h2 id="d-hd-name" style="font-size:14px"></h2>
      <button class="btn btn-ghost btn-sm" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-hero" id="d-hero"></div>
    <div class="hero-thumb-strip" id="d-thumbs" style="display:none"></div>
    <div class="detail-body">
      <div class="detail-name" id="d-name"></div>
      <div class="detail-cat" id="d-cat"></div>
      <div class="detail-grid">
        <div class="detail-field"><label>Quantity</label><div class="val plain" id="d-qty"></div></div>
        <div class="detail-field"><label>Unit Value</label><div class="val" id="d-value"></div></div>
        <div class="detail-field"><label>Total Value</label><div class="val total" id="d-total"></div></div>
        <div class="detail-field"><label>Purchase Price (unit)</label><div class="val" id="d-price"></div></div>
        <div class="detail-field"><label>Condition</label><div class="val plain" id="d-condition"></div></div>
        <div class="detail-field"><label>Maker / Brand</label><div class="val plain" id="d-maker"></div></div>
        <div class="detail-field"><label>Model / Serial</label><div class="val plain" id="d-model"></div></div>
      </div>
      <div id="d-note-wrap" style="display:none"><div class="detail-note" id="d-note"></div></div>
    </div>
    <div class="detail-ft">
      <button class="btn btn-danger btn-sm" onclick="deleteFromDetail()">Delete</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="closeDetail()">Close</button>
        <button class="btn btn-primary btn-sm" onclick="editFromDetail()">Edit</button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<!-- LOV -->
<div class="overlay" id="lov-overlay" onclick="if(event.target===this)closeLov()">
  <div class="panel" style="max-width:440px">
    <div class="panel-hd"><h2>Categories</h2><button class="btn btn-ghost btn-sm" onclick="closeLov()">✕</button></div>
    <div id="lov-list"></div>
    <div class="lov-add-row">
      <input type="text" id="lov-input" placeholder="New category…" onkeydown="if(event.key==='Enter')addCategory()">
      <button class="btn btn-primary" onclick="addCategory()">Add</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <h3>Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://baiygnoixrmslksbexel.supabase.co';
const SUPABASE_KEY='sb_publishable_gw1I9h1CFF7s5k1WdG4g4w_S6IA8TBJ';
const PIN='2259';
const BUCKET='tool-photos';
const API=`${SUPABASE_URL}/rest/v1`;
const STORAGE=`${SUPABASE_URL}/storage/v1`;
const HDR={'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'};

let tools=[],categories=[];let photoCache={};
let editingId=null,viewingId=null,pendingPhotos=[],activeCategory='',viewMode='grid';

// PIN
let pinEntry='';
function pinKey(d){if(pinEntry.length>=4)return;pinEntry+=d;updatePinDots();if(pinEntry.length===4)setTimeout(checkPin,80);}
function pinBack(){pinEntry=pinEntry.slice(0,-1);updatePinDots();}
function pinClear(){pinEntry='';updatePinDots();}
function updatePinDots(){document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pinEntry.length));}
function checkPin(){
  if(pinEntry===PIN){document.getElementById('pin-screen').style.display='none';document.getElementById('app-screen').classList.add('active');init();}
  else{document.getElementById('pin-error').textContent='Incorrect PIN';pinEntry='';updatePinDots();setTimeout(()=>document.getElementById('pin-error').textContent='',1500);}
}

// SUPABASE
async function sbGet(t,p=''){const r=await fetch(`${API}/${t}?${p}`,{headers:HDR});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,b){const r=await fetch(`${API}/${t}`,{method:'POST',headers:HDR,body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPatch(t,id,b){const r=await fetch(`${API}/${t}?id=eq.${id}`,{method:'PATCH',headers:{...HDR,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbDelete(t,id){const r=await fetch(`${API}/${t}?id=eq.${id}`,{method:'DELETE',headers:HDR});if(!r.ok)throw new Error(await r.text());}
async function sbDeleteWhere(t,c,v){const r=await fetch(`${API}/${t}?${c}=eq.${encodeURIComponent(v)}`,{method:'DELETE',headers:HDR});if(!r.ok)throw new Error(await r.text());}
async function uploadPhoto(file,toolId){
  const ext=file.name.split('.').pop()||'jpg';
  const path=`${toolId}/${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;
  const r=await fetch(`${STORAGE}/object/${BUCKET}/${path}`,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':file.type||'image/jpeg'},body:file});
  if(!r.ok)return null;
  return `${STORAGE}/object/public/${BUCKET}/${path}`;
}

// INIT
async function init(){
  loadingStart();
  try{
    await Promise.all([loadTools(),loadCategories()]);
    renderCatTabs();renderGrid();renderDashboard();updateStats();setSyncDot('ok');
  }catch(e){console.error(e);toast('Connection error');setSyncDot('error');renderCatTabs();renderGrid();}
  loadingDone();
}
async function loadTools(){tools=await sbGet('tools','order=name.asc');}
async function loadCategories(){
  const rows=await sbGet('categories','order=name.asc');
  if(!rows.length){
    const defaults=['Power Tool','Hand Tool','Clamping','Metal Working','Layout & Marking','Sharpening & Maintenance','Blade & Bit','Measuring','Turning','Joinery','Finishing','Safety','Stationary Tool','Consumable','Other'];
    await Promise.all(defaults.map(n=>sbPost('categories',{name:n}).catch(()=>{})));
    categories=defaults;
  }else{categories=rows.map(r=>r.name);}
}
async function loadPhotosForTool(id){
  if(photoCache[id]!==undefined)return photoCache[id];
  try{
    const rows=await sbGet('photos',`tool_id=eq.${id}&order=position.asc`);
    photoCache[id]=rows;
    return rows;
  }catch(e){photoCache[id]=[];return[];}
}
function invalidatePhotoCache(id){delete photoCache[id];}
function photosForTool(id){return photoCache[id]||[];}

// CALC
function updateCalc(){
  const qty=parseFloat(document.getElementById('f-qty').value)||0;
  const val=parseFloat(document.getElementById('f-value').value)||0;
  const total=qty*val;
  document.getElementById('calc-display').textContent=total>0?`$${total.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:'—';
}
function totalValue(t){return(parseFloat(t.unit_value)||parseFloat(t.value)||0)*(parseInt(t.quantity)||1);}

// RENDER
async function renderGrid(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const sort=document.getElementById('sort-sel').value;
  let items=tools.filter(t=>{
    if(activeCategory&&t.cat!==activeCategory)return false;
    if(q)return`${t.name} ${t.cat||''} ${t.maker||''} ${t.model||''} ${t.note||''}`.toLowerCase().includes(q);
    return true;
  });
  items.sort((a,b)=>{
    if(sort==='name')return(a.name||'').localeCompare(b.name||'');
    if(sort==='cat')return(a.cat||'').localeCompare(b.cat||'');
    if(sort==='value')return totalValue(b)-totalValue(a);
    if(sort==='price')return(parseFloat(b.price)||0)-(parseFloat(a.price)||0);
    return 0;
  });
  const grid=document.getElementById('grid');
  if(viewMode==='list')grid.style.gridTemplateColumns='1fr';
  else grid.style.gridTemplateColumns='';
  if(!items.length){grid.innerHTML=`<div class="empty-state"><div class="icon">🔧</div><p>${q||activeCategory?'No tools match.':'No tools yet — tap + to add your first.'}</p></div>`;return;}
  grid.innerHTML='';
  items.forEach(t=>{
    const qty=parseInt(t.quantity)||1;
    const tv=totalValue(t);
    const uv=parseFloat(t.unit_value)||parseFloat(t.value)||0;
    const card=document.createElement('div');
    card.className='tool-card';card.onclick=()=>openDetail(t.id);
    const tp=photoCache[t.id]||[];
    const photoHtml=tp.length
      ?`<div class="tc-photo"><img src="${tp[0].url}" alt="${t.name}" loading="lazy">${qty>1?`<div class="tc-qty-badge">×${qty}</div>`:''} ${tp.length>1?`<div class="photo-count">+${tp.length}</div>`:''}</div>`
      :`<div class="tc-photo"><div class="tc-photo-placeholder" data-id="${t.id}">${qty>1?`<div class="tc-qty-badge">×${qty}</div>`:''}🔧</div></div>`;
    card.innerHTML=`${photoHtml}
      <div class="tc-body">
        <div class="tc-cat">${t.cat||'Uncategorized'}</div>
        <div class="tc-name">${t.name}</div>
        ${t.maker?`<div class="tc-maker">${t.maker}${t.model?' · '+t.model:''}</div>`:''}
        <div class="tc-vals">
          <div class="tc-val">${qty>1?`${qty}×`:''}${uv?'$'+Number(uv).toLocaleString():'—'}</div>
          <div class="tc-val">Total <span>${tv?'$'+tv.toLocaleString(undefined,{maximumFractionDigits:0}):'—'}</span></div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  // Lazy load photos for visible cards
  setTimeout(()=>{
    document.querySelectorAll('.tc-photo-placeholder').forEach(async el=>{
      const id=el.dataset.id;
      if(!id)return;
      const photos=await loadPhotosForTool(id);
      if(photos.length>0){
        const t=tools.find(x=>x.id===id);
        const qty=parseInt(t?.quantity)||1;
        const parent=el.parentElement;
        parent.innerHTML=`<img src="${photos[0].url}" alt="" loading="lazy">${qty>1?`<div class="tc-qty-badge">×${qty}</div>`:''} ${photos.length>1?`<div class="photo-count">+${photos.length}</div>`:''}`;
      }
    });
  },100);
}
function renderCatTabs(){
  const tabs=document.getElementById('cat-tabs');tabs.innerHTML='';
  const all=document.createElement('div');all.className='cat-tab'+(activeCategory===''?' active':'');all.textContent='All';
  all.onclick=()=>{activeCategory='';renderCatTabs();renderGrid();};tabs.appendChild(all);
  const usedCats=[...new Set(tools.map(t=>t.cat).filter(Boolean))].sort();
  usedCats.forEach(c=>{const tab=document.createElement('div');tab.className='cat-tab'+(activeCategory===c?' active':'');tab.textContent=c;tab.onclick=()=>{activeCategory=c;renderCatTabs();renderGrid();};tabs.appendChild(tab);});
}
function renderDashboard(){
  const totalVal=tools.reduce((s,t)=>s+totalValue(t),0);
  const totalItems=tools.reduce((s,t)=>s+(parseInt(t.quantity)||1),0);
  const totalPaid=tools.reduce((s,t)=>s+(parseFloat(t.price)||0)*(parseInt(t.quantity)||1),0);
  const withPhotos=tools.filter(t=>(photoCache[t.id]||[]).length>0).length;
  const cats=[...new Set(tools.map(t=>t.cat).filter(Boolean))].length;
  document.getElementById('dashboard').innerHTML=`
    <div class="dash-card"><div class="dc-label">SKUs</div><div class="dc-val">${tools.length}</div><div class="dc-sub">${totalItems} total items</div></div>
    <div class="dash-card"><div class="dc-label">Total Value</div><div class="dc-val">$${totalVal.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="dc-sub">declared</div></div>
    <div class="dash-card"><div class="dc-label">Total Paid</div><div class="dc-val">$${totalPaid.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="dc-sub">purchase price</div></div>
    <div class="dash-card"><div class="dc-label">Categories</div><div class="dc-val">${cats}</div><div class="dc-sub">in use</div></div>
    <div class="dash-card"><div class="dc-label">Photographed</div><div class="dc-val">${withPhotos}</div><div class="dc-sub">of ${tools.length} SKUs</div></div>`;
}
function updateStats(){
  const totalVal=tools.reduce((s,t)=>s+totalValue(t),0);
  const totalItems=tools.reduce((s,t)=>s+(parseInt(t.quantity)||1),0);
  document.getElementById('header-stats').textContent=`${totalItems} items · $${totalVal.toLocaleString(undefined,{maximumFractionDigits:0})}`;
}
function showView(mode){viewMode=mode;document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['grid','list','sync'][i]===mode));renderGrid();}

// ADD/EDIT
function openAdd(){
  editingId=null;pendingPhotos=[];
  document.getElementById('modal-title').textContent='Add Tool';
  document.getElementById('delete-btn').style.display='none';
  document.getElementById('save-btn').textContent='Save Tool';
  ['f-name','f-price','f-value','f-maker','f-model','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-qty').value='1';
  document.getElementById('f-condition').value='Good';
  document.getElementById('calc-display').textContent='—';
  populateCatSelect();renderPhotoStrip();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}
async function openEdit(id){
  const t=tools.find(x=>x.id===id);if(!t)return;
  editingId=id;
  const tp=await loadPhotosForTool(id);
  pendingPhotos=tp.map(p=>({existing:true,url:p.url,dbId:p.id}));
  document.getElementById('modal-title').textContent='Edit Tool';
  document.getElementById('delete-btn').style.display='block';
  document.getElementById('save-btn').textContent='Update Tool';
  populateCatSelect();
  document.getElementById('f-name').value=t.name||'';
  document.getElementById('f-cat').value=t.cat||'';
  document.getElementById('f-condition').value=t.condition||'Good';
  document.getElementById('f-qty').value=t.quantity||1;
  document.getElementById('f-price').value=t.price||'';
  document.getElementById('f-value').value=t.unit_value||t.value||'';
  document.getElementById('f-maker').value=t.maker||'';
  document.getElementById('f-model').value=t.model||'';
  document.getElementById('f-note').value=t.note||'';
  updateCalc();renderPhotoStrip();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function populateCatSelect(){
  const el=document.getElementById('f-cat');const prev=el.value;
  el.innerHTML=categories.slice().sort().map(c=>`<option value="${c}">${c}</option>`).join('');
  el.value=prev||categories[0]||'';
}
function triggerPhoto(){document.getElementById('photo-input').click();}
async function handlePhotos(e){
  const files=Array.from(e.target.files);
  for(const f of files){const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=ev=>res(ev.target.result);r.readAsDataURL(f);});pendingPhotos.push({existing:false,file:f,dataUrl});}
  renderPhotoStrip();e.target.value='';
}
function renderPhotoStrip(){
  const strip=document.getElementById('photo-strip');strip.innerHTML='';
  pendingPhotos.forEach((p,i)=>{
    const wrap=document.createElement('div');wrap.className='photo-thumb';
    const src=p.existing?p.url:p.dataUrl;
    wrap.innerHTML=`<img src="${src}" alt="photo ${i+1}"><button class="del-ph" onclick="removePhoto(${i})">✕</button>`;
    strip.appendChild(wrap);
  });
  const addBtn=document.createElement('button');addBtn.type='button';addBtn.className='add-ph-btn';
  addBtn.innerHTML='<span class="plus">+</span><span>Camera</span>';addBtn.onclick=triggerPhoto;strip.appendChild(addBtn);
}
function removePhoto(i){pendingPhotos.splice(i,1);renderPhotoStrip();}

async function saveTool(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Tool name is required');return;}
  const btn=document.getElementById('save-btn');btn.textContent='Saving…';btn.disabled=true;setSyncDot('syncing');
  try{
    const qty=parseInt(document.getElementById('f-qty').value)||1;
    const uv=parseFloat(document.getElementById('f-value').value)||null;
    const toolData={
      name,cat:document.getElementById('f-cat').value,condition:document.getElementById('f-condition').value,
      quantity:qty,unit_value:uv,value:uv,
      price:parseFloat(document.getElementById('f-price').value)||null,
      maker:document.getElementById('f-maker').value.trim()||null,
      model:document.getElementById('f-model').value.trim()||null,
      note:document.getElementById('f-note').value.trim()||null,
      updated:Date.now()
    };
    let toolId=editingId;
    if(editingId){await sbPatch('tools',editingId,toolData);}
    else{toolId=`t_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;toolData.id=toolId;await sbPost('tools',toolData);}
    if(editingId){
      const existingIds=pendingPhotos.filter(p=>p.existing).map(p=>p.dbId);
      const oldPhotos=photosForTool(editingId);
      for(const op of oldPhotos){if(!existingIds.includes(op.id))await sbDelete('photos',op.id).catch(()=>{});}
    }
    let pos=pendingPhotos.filter(p=>p.existing).length;
    for(const p of pendingPhotos.filter(p=>!p.existing)){
      let url=null;if(p.file)url=await uploadPhoto(p.file,toolId);
      if(!url)url=p.dataUrl;
      await sbPost('photos',{id:`ph_${Date.now()}_${Math.random().toString(36).slice(2,5)}`,tool_id:toolId,url,position:pos++});
    }
    invalidatePhotoCache(toolId);await loadPhotosForTool(toolId);await loadTools();
    renderGrid();renderDashboard();renderCatTabs();updateStats();
    closeModal();toast(editingId?'Tool updated':'Tool added');setSyncDot('ok');
  }catch(e){console.error(e);toast('Save failed — '+e.message.slice(0,60));setSyncDot('error');}
  btn.textContent=editingId?'Update Tool':'Save Tool';btn.disabled=false;
}

// DELETE
let confirmCb=null;
function openConfirm(msg,cb){document.getElementById('confirm-msg').textContent=msg;confirmCb=cb;document.getElementById('confirm-overlay').classList.add('open');document.getElementById('confirm-ok').onclick=()=>{closeConfirm();cb();};}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');}
function deleteCurrent(){
  const t=tools.find(x=>x.id===editingId);if(!t)return;
  openConfirm(`Delete "${t.name}"? This cannot be undone.`,async()=>{
    setSyncDot('syncing');
    try{await sbDeleteWhere('photos','tool_id',editingId);await sbDelete('tools',editingId);invalidatePhotoCache(editingId);await loadTools();renderGrid();renderDashboard();renderCatTabs();updateStats();closeModal();toast('Tool deleted');setSyncDot('ok');}
    catch(e){toast('Delete failed');setSyncDot('error');}
  });
}
function deleteFromDetail(){
  const t=tools.find(x=>x.id===viewingId);if(!t)return;
  openConfirm(`Delete "${t.name}"?`,async()=>{
    setSyncDot('syncing');
    try{await sbDeleteWhere('photos','tool_id',viewingId);await sbDelete('tools',viewingId);invalidatePhotoCache(viewingId);await loadTools();renderGrid();renderDashboard();renderCatTabs();updateStats();closeDetail();toast('Tool deleted');setSyncDot('ok');}
    catch(e){toast('Delete failed');setSyncDot('error');}
  });
}

// DETAIL
async function openDetail(id){
  const t=tools.find(x=>x.id===id);if(!t)return;
  viewingId=id;
  const tp=await loadPhotosForTool(id);
  const qty=parseInt(t.quantity)||1;
  const uv=parseFloat(t.unit_value)||parseFloat(t.value)||0;
  const tv=totalValue(t);
  document.getElementById('d-hd-name').textContent=t.name;
  document.getElementById('d-name').textContent=t.name;
  document.getElementById('d-cat').textContent=t.cat||'';
  document.getElementById('d-qty').textContent=qty;
  document.getElementById('d-value').textContent=uv?`$${Number(uv).toLocaleString()}`:'—';
  document.getElementById('d-total').textContent=tv?`$${tv.toLocaleString(undefined,{maximumFractionDigits:0})}`:'—';
  document.getElementById('d-price').textContent=t.price?`$${Number(t.price).toLocaleString()}`:'—';
  document.getElementById('d-condition').textContent=t.condition||'—';
  document.getElementById('d-maker').textContent=t.maker||'—';
  document.getElementById('d-model').textContent=t.model||'—';
  const nw=document.getElementById('d-note-wrap');
  if(t.note){nw.style.display='block';document.getElementById('d-note').textContent=t.note;}else{nw.style.display='none';}
  const hero=document.getElementById('d-hero');const thumbs=document.getElementById('d-thumbs');
  if(tp.length){
    hero.innerHTML=`<img class="detail-hero-img" id="d-hero-img" src="${tp[0].url}" alt="${t.name}" onclick="openLightbox('${tp[0].url}')">`;
    if(tp.length>1){thumbs.style.display='flex';thumbs.innerHTML=tp.map((p,i)=>`<div class="hero-thumb${i===0?' active':''}" onclick="setHeroPhoto('${p.url}',this)"><img src="${p.url}" alt=""></div>`).join('');}
    else{thumbs.style.display='none';}
  }else{hero.innerHTML=`<div class="detail-hero-placeholder">🔧</div>`;thumbs.style.display='none';}
  document.getElementById('detail-overlay').classList.add('open');
}
function setHeroPhoto(url,el){document.getElementById('d-hero-img').src=url;document.getElementById('d-hero-img').onclick=()=>openLightbox(url);document.querySelectorAll('.hero-thumb').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');}
function editFromDetail(){closeDetail();openEdit(viewingId);}

// LIGHTBOX
function openLightbox(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// LOV
function openLov(){renderLovList();document.getElementById('lov-overlay').classList.add('open');}
function closeLov(){document.getElementById('lov-overlay').classList.remove('open');}
function renderLovList(){document.getElementById('lov-list').innerHTML=categories.slice().sort().map(c=>`<div class="lov-item"><span>${c}</span><button class="btn btn-ghost btn-sm" onclick="removeCategory('${c.replace(/'/g,"\\'")}')">Remove</button></div>`).join('');}
async function addCategory(){
  const v=document.getElementById('lov-input').value.trim();if(!v||categories.includes(v))return;
  try{await sbPost('categories',{name:v});categories.push(v);categories.sort();renderLovList();populateCatSelect();renderCatTabs();document.getElementById('lov-input').value='';toast('Category added');}
  catch(e){toast('Failed to add category');}
}
async function removeCategory(c){
  if(tools.some(t=>t.cat===c)){toast('Category in use — reassign tools first');return;}
  try{await fetch(`${API}/categories?name=eq.${encodeURIComponent(c)}`,{method:'DELETE',headers:HDR});categories=categories.filter(x=>x!==c);renderLovList();populateCatSelect();renderCatTabs();toast('Category removed');}
  catch(e){toast('Failed to remove');}
}

// SYNC
async function syncNow(){
  setSyncDot('syncing');
  try{photoCache={};await Promise.all([loadTools(),loadCategories()]);renderGrid();renderDashboard();renderCatTabs();updateStats();setSyncDot('ok');toast('Synced');}
  catch(e){setSyncDot('error');toast('Sync failed');}
}
function setSyncDot(s){const d=document.getElementById('sync-dot');d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');}

// LOADING / TOAST
function loadingStart(){document.getElementById('loading-bar').className='active';}
function loadingDone(){const b=document.getElementById('loading-bar');b.className='done';setTimeout(()=>b.className='',400);}
let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);}

// PDF
async function exportPDF(){
  toast('PDF export coming soon — finish loading your inventory first');
}
</script>
